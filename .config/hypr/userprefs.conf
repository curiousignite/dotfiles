# Set your personal hyprland configuration here
# For a sample file, please refer to https://github.com/prasanthrangan/hyprdots/blob/main/Configs/.config/hypr/userprefs.t2

workspace = 1, default:true,monitor:DP-3
workspace = 2, monitor:HDMI-A-1

input {
    repeat_delay = 250
    kb_layout = tr,tr
    kb_variant = alt,basic
    kb_options = grp:win_space_toggle
}
cursor{
    default_monitor = DP-3
}

exec-once = /usr/bin/kdeconnectd 
exec-once = kdeconncet-indicator
exec-once = brightness init
exec-once = jellyfin-mpv-shim
exec-once = xrandr --output DP-3 --primary

exec-once = vesktop
exec-once = [workspace special silent] /usr/bin/firefoxpwa site launch 01k16rynnbbr60emy8z4gy7kqh
exec-once = [workspace special silent] teams-for-linux
exec-once = [workspace 3] zen-browser
exec-once = [workspace 1] steam


windowrulev = workspace special silent, class:^(vesktop)$

input:touchpad {
    natural_scroll = true
}


# Persistent gaming mode
animations {
    enabled  = 1
}
general{
    gaps_in = 10
    gaps_out = 15
    border_size = 1
}
decoration{
    rounding = 15
    active_opacity = 1
    inactive_opacity = 1
    fullscreen_opacity = 1 
    blur:xray = 0
    blur:enabled = 0
    shadow:enabled = 0
}
xwayland {
  force_zero_scaling = true
}

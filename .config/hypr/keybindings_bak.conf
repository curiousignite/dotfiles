# в–Ҳв–„в–ҖвҖғв–Ҳв–Җв–ҖвҖғв–Ҳв–„в–ҲвҖғв–Ҳв–„в–„вҖғв–ҲвҖғв–Ҳв–„в–‘в–ҲвҖғв–Ҳв–Җв–„вҖғв–ҲвҖғв–Ҳв–„в–‘в–ҲвҖғв–Ҳв–Җв–ҖвҖғв–Ҳв–Җ
# в–Ҳв–‘в–ҲвҖғв–Ҳв–Ҳв–„вҖғв–‘в–Ҳв–‘вҖғв–Ҳв–„в–ҲвҖғв–ҲвҖғв–Ҳв–‘в–Җв–ҲвҖғв–Ҳв–„в–ҖвҖғв–ҲвҖғв–Ҳв–‘в–Җв–ҲвҖғв–Ҳв–„в–ҲвҖғв–„в–Ҳ

# See https://wiki.hyprland.org/Configuring/Keywords/
#  &  https://wiki.hyprland.org/Configuring/Binds/

# Main modifier
$mainMod = Super # super / meta / windows key

# Assign apps
$term = kitty
$file = dolphin
$browser = zen-browser

$wm=Window Management
$d=[$wm]
# Window/Session actions
bindd = $mainMod, Q, $d close focused window, exec, hyde-shell dontkillsteam
bindd = Alt, F4, $d close focused window, exec, hyde-shell dontkillsteam
bindd = $mainMod, Delete, $d kill hyprland session, exit,
bindd = $mainMod, W, $d toggle floating, togglefloating,
bindd = Alt, Return, $d toggle fullscreen, fullscreen,
bindd = $mainMod+Shift, F, $d toggle pin on focused window, exec, $scrPath/windowpin.sh
bindd = $mainMod, Backspace, $d logout menu, exec, $scrPath/logoutlaunch.sh
bindd = Ctrl+Alt, W, $d toggle waybar and reload config, exec, killall waybar && (env reload_flag=1 $scrPath/wbarconfgen.sh)
bindd = $mainMod, U, $d toggle split, layoutmsg, togglesplit

$d=[$wm|Change focus]
bindd = $mainMod, H, $d focus left, movefocus, l
bindd = $mainMod, L, $d focus right, movefocus, r
bindd = $mainMod, K, $d focus up, movefocus, u
bindd = $mainMod, J, $d focus down, movefocus, d
bindd = Alt, Tab, $d cycle focus, cyclenext,

$d=[$wm|Resize Active Window]
bindde = $mainMod+Ctrl, L, $d resize window right, resizeactive, 30 0
bindde = $mainMod+Ctrl, H, $d resize window left, resizeactive, -30 0
bindde = $mainMod+Ctrl, K, $d resize window up, resizeactive, 0 -30
bindde = $mainMod+Ctrl, J, $d resize window down, resizeactive, 0 30

$d=[$wm|Move active window across workspace]
$moveactivewindow=grep -q "true" <<< $(hyprctl activewindow -j | jq -r .floating) && hyprctl dispatch moveactive
binded = $mainMod SHIFT, H, $d Move activewindow left, exec, $moveactivewindow -30 0  || hyprctl dispatch movewindow l
binded = $mainMod SHIFT, L, $d Move activewindow right, exec, $moveactivewindow 30 0   || hyprctl dispatch movewindow r
binded = $mainMod SHIFT, K, $d Move activewindow up, exec, $moveactivewindow  0 -30 || hyprctl dispatch movewindow u
binded = $mainMod SHIFT, J, $d Move activewindow down, exec, $moveactivewindow 0 30   || hyprctl dispatch movewindow d

$d=[$wm|Move & Resize with mouse]
binddm = $mainMod, mouse:272, $d hold to move window, movewindow
binddm = $mainMod, mouse:273, $d hold to resize window, resizewindow
binddm = $mainMod, Z, $d hold to move window, movewindow
binddm = $mainMod, X, $d hold to resize window, resizewindow


$l=Launcher
$d=[$l|Apps]
bindd = $mainMod, T, $d terminal emulator , exec, $TERMINAL
bindd = $mainMod, grave, $d dropdown terminal , exec, hyde-shell pypr toggle console
bindd = $mainMod, E, $d file explorer , exec, $EXPLORER
bindd = $mainMod, F, $d web browser , exec, $BROWSER
bindd = $mainMod, O, $d obsidian , exec, obsidian
bindd = $mainMod, D, $d discord , exec, discord
bindd = Control Shift, Escape, $d system monitor , exec, hyde-shell system.monitor

$d=[$l|Rofi menus]
$rofi-launch=hyde-shell rofilaunch
bindd = $mainMod, A, $d application finder , exec, pkill -x rofi || $rofi-launch d
bindd = $mainMod, TAB, $d window switcher , exec, pkill -x rofi || $rofi-launch w
bindd = $mainMod Shift, E, $d file finder , exec, pkill -x rofi || $rofi-launch f
bindd = $mainMod, slash, $d keybindings hint, exec, pkill -x rofi || hyde-shell keybinds_hint c
bindd = $mainMod, comma, $d emoji picker , exec, pkill -x rofi || hyde-shell emoji-picker
bindd = $mainMod, period, $d glyph picker , exec, pkill -x rofi || hyde-shell glyph-picker
bindd = $mainMod, V, $d clipboard , exec, pkill -x rofi || hyde-shell cliphist -c
bindd = $mainMod Shift, V, $d clipboard manager , exec, pkill -x rofi || hyde-shell cliphist
bindd = $mainMod Shift, A, $d select rofi launcher , exec, pkill -x rofi || hyde-shell rofiselect
# Script alternative versions from your config
bindd = $mainMod, V, $d clipboard manager (script), exec, pkill -x rofi || $scrPath/cliphist.sh -c
bindd = $mainMod, C, $d keybinds hint (script), exec, pkill -x rofi || $scrPath/keybinds_hint.sh c


$hc=Hardware Controls
$d=[$hc|Audio]
binddl  = , F10, $d toggle mute output , exec, hyde-shell volumecontrol -o m
binddl  = , XF86AudioMute, $d toggle mute output, exec, hyde-shell volumecontrol -o m
binddel = , F11, $d decrease volume , exec, hyde-shell volumecontrol -o d
binddel = , F12, $d increase volume , exec, hyde-shell volumecontrol -o i
binddl  = , XF86AudioMicMute, $d un/mute microphone  , exec, hyde-shell volumecontrol -i m
binddel = , XF86AudioLowerVolume, $d decrease volume , exec, hyde-shell volumecontrol -o d
binddel = , XF86AudioRaiseVolume, $d increase volume , exec, hyde-shell volumecontrol -o i
binddel = , XF86Calculator, $d open calculator, exec, hyde-shell calculator

$d=[$hc|Media]
binddl  = , XF86AudioPlay, $d play media, exec, playerctl play-pause
binddl  = , XF86AudioPause, $d pause media, exec, playerctl play-pause
binddl  = , XF86AudioNext, $d next media  , exec, playerctl next
binddl  = , XF86AudioPrev, $d previous media , exec, playerctl previous

$d=[$hc|Brightness]
binddel = , XF86MonBrightnessUp, $d increase brightness , exec, hyde-shell brightnesscontrol i
binddel = , XF86MonBrightnessDown, $d decrease brightness , exec, hyde-shell brightnesscontrol d


$ut=Utilities
$d=[$ut|Screen Capture]
bindd = $mainMod+Shift, P, $d color picker, exec, hyprpicker -a
bindd =      ,Print, $d no annotation screenshot capture, exec, $scrPath/screenshot.sh sf
bindd = Ctrl ,Print, $d partial screenshot capture, exec, $scrPath/screenshot.sh sf
bindd = Shift,Print, $d tesseract OCR capture, exec, $scrPath/screenshot.sh sc


$rice=Theming and Wallpaper
$d=[$rice]
bindd = $mainMod Alt, Right, $d next global wallpaper , exec, hyde-shell wallpaper -Gn
bindd = $mainMod Alt, Left, $d previous global wallpaper , exec, hyde-shell wallpaper -Gp
bindd = $mainMod Shift, W, $d select a global wallpaper , exec, pkill -x rofi || hyde-shell wallpaper -SG
bindd = $mainMod Alt, Up, $d next waybar layout , exec, hyde-shell wbarconfgen n
bindd = $mainMod Alt, Down, $d previous waybar layout , exec, hyde-shell wbarconfgen p
bindd = $mainMod Shift, R, $d wallbash mode selector , exec, pkill -x rofi || hyde-shell wallbashtoggle -m
bindd = $mainMod Shift, T, $d select a theme, exec, pkill -x rofi || hyde-shell themeselect
bindd = $mainMod+Shift, Y, $d select animations, exec, pkill -x rofi || hyde-shell animations --select
bindd = $mainMod+Alt, A, $d launch animations manager, exec, pkill -x rofi || $scrPath/animations.sh


$ws=Workspaces
$d=[$ws|Navigation]
bindd = $mainMod, 1, $d navigate to workspace 1 , workspace, 1
bindd = $mainMod, 2, $d navigate to workspace 2 , workspace, 2
bindd = $mainMod, 3, $d navigate to workspace 3 , workspace, 3
bindd = $mainMod, 4, $d navigate to workspace 4 , workspace, 4
bindd = $mainMod, 5, $d navigate to workspace 5 , workspace, 5
bindd = $mainMod, 6, $d navigate to workspace 6 , workspace, 6
bindd = $mainMod, 7, $d navigate to workspace 7 , workspace, 7
bindd = $mainMod, 8, $d navigate to workspace 8 , workspace, 8
bindd = $mainMod, 9, $d navigate to workspace 9 , workspace, 9
bindd = $mainMod, 0, $d navigate to workspace 10 , workspace, 10
bindd = $mainMod+Ctrl, Down, $d navigate to the nearest empty workspace , workspace, empty
bindd = $mainMod, mouse_down, $d next workspace, workspace, e+1
bindd = $mainMod, mouse_up, $d previous workspace, workspace, e-1
bindd = $mainMod SHIFT, U, $d swap active workspaces, swapactiveworkspaces, current +1

$d=[$ws|Move window to workspace]
bindd = $mainMod Shift, 1, $d move to workspace 1 , movetoworkspace, 1
bindd = $mainMod Shift, 2, $d move to workspace 2 , movetoworkspace, 2
bindd = $mainMod Shift, 3, $d move to workspace 3 , movetoworkspace, 3
bindd = $mainMod Shift, 4, $d move to workspace 4 , movetoworkspace, 4
bindd = $mainMod Shift, 5, $d move to workspace 5 , movetoworkspace, 5
bindd = $mainMod Shift, 6, $d move to workspace 6 , movetoworkspace, 6
bindd = $mainMod Shift, 7, $d move to workspace 7 , movetoworkspace, 7
bindd = $mainMod Shift, 8, $d move to workspace 8 , movetoworkspace, 8
bindd = $mainMod Shift, 9, $d move to workspace 9 , movetoworkspace, 9
bindd = $mainMod Shift, 0, $d move to workspace 10 , movetoworkspace, 10

$d=[$ws|Navigation|Special workspace]
bindd = $mainMod+Alt, S, $d move to scratchpad (silent) , movetoworkspacesilent, special
bindd = $mainMod+Shift, S, $d move to scratchpad  , movetoworkspace, special
bindd = $mainMod, S, $d toggle scratchpad , togglespecialworkspace,

$d=[$ws|Navigation|Move window silently]
bindd = $mainMod+Alt, 1, $d move to workspace 1  (silent), movetoworkspacesilent, 1
bindd = $mainMod+Alt, 2, $d move to workspace 2  (silent), movetoworkspacesilent, 2
bindd = $mainMod+Alt, 3, $d move to workspace 3  (silent), movetoworkspacesilent, 3
bindd = $mainMod+Alt, 4, $d move to workspace 4  (silent), movetoworkspacesilent, 4
bindd = $mainMod+Alt, 5, $d move to workspace 5  (silent), movetoworkspacesilent, 5
bindd = $mainMod+Alt, 6, $d move to workspace 6  (silent), movetoworkspacesilent, 6
bindd = $mainMod+Alt, 7, $d move to workspace 7  (silent), movetoworkspacesilent, 7
bindd = $mainMod+Alt, 8, $d move to workspace 8  (silent), movetoworkspacesilent, 8
bindd = $mainMod+Alt, 9, $d move to workspace 9  (silent), movetoworkspacesilent, 9
bindd = $mainMod+Alt, 0, $d move to workspace 10 (silent), movetoworkspacesilent, 10

$d=#! unset the group name
